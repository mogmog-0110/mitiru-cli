name: release

# Cross-builds the mitiru CLI + MitiruEngine_Installer for windows-amd64 and
# attaches them to the GitHub Release whenever a v* tag is pushed.
#
# The engine repo's release-zip.yml downloads these from the latest mitiru-cli
# release and bundles them into the MitiruEngine portable zip.
#
# Spec: docs/INSTALLER.md (engine repo) — describes how the installer is used
# from the user side.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write  # required to upload release assets

jobs:
  windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Install rsrc (manifest → .syso generator)
        run: go install github.com/akavel/rsrc@latest

      - name: Generate installer manifest .syso
        run: |
          & "$env:GOPATH\bin\rsrc.exe" -manifest cmd\installer\installer.manifest `
            -o cmd\installer\installer.syso -arch amd64
        shell: pwsh

      - name: Build mitiru.exe
        run: go build -ldflags="-s -w" -o mitiru.exe .\cmd\mitiru
        shell: pwsh
        env:
          GOOS: windows
          GOARCH: amd64

      - name: Build MitiruEngine_Installer.exe
        run: go build -ldflags="-s -w" -o MitiruEngine_Installer.exe .\cmd\installer
        shell: pwsh
        env:
          GOOS: windows
          GOARCH: amd64

      - name: Sanity check — installer --help exits cleanly
        run: .\MitiruEngine_Installer.exe --help
        shell: pwsh

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mitiru.exe
            MitiruEngine_Installer.exe
          # Release notes auto-generated by GitHub from commits since previous tag.
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
